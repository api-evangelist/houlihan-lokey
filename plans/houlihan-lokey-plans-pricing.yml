description: Houlihan Lokey is a global investment bank focused on M&A advisory, capital solutions,
  financial restructuring, and valuation services. It does not operate a public developer API portal
  and does not publish API pricing. References in this scaffold to api.hl.com and developer.hl.com
  are placeholders. The firm's commercial model is fee-for-engagement advisory rather than API-based
  service delivery.
notes: No public developer API or commercial API surface was identified. Houlihan Lokey is purely
  an advisory firm with no API consumption model. Preserved as a trimmed scaffold pending any future
  public API offering.
sources:
